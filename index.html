<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />
    <link rel="stylesheet" href="./style.css" />
    <title>Frontend Mentor | Stats preview card component</title>
  </head>
  <body>
    <div class="container">
      <div class="img-container">
        <img
          src="./images/image-header-mobile.jpg"
          alt="Work in our offices"
          class="img-mobile" />
        <img
          src="./images/image-header-desktop.jpg"
          alt="Work in our offices"
          class="img-desktop" />
        <div class="filter"></div>
      </div>
      <div class="text-container">
        <h1>Get <span>insights</span> that help your business grow.</h1>
        <p class="description">
          Discover the benefits of data analytics and make better decisions
          regarding revenue, customer experience, and overall efficiency.
        </p>
        <div class="stats-container">
          <div class="stat">
            <p class="stat-proof">10k+</p>
            <p class="stat-title">companies</p>
          </div>
          <div class="stat">
            <p class="stat-proof">314</p>
            <p class="stat-title">templates</p>
          </div>
          <div class="stat">
            <p class="stat-proof">12M+</p>
            <p class="stat-title">queries</p>
          </div>
        </div>
      </div>
    </div>
    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="https://github.com/Thomas-Bezille/">Thomas Bezille</a>.
    </footer>
  </body>
</html>
